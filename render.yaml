services:
  - type: web
    name: spotify-audit
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web.app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    # Persistent disk keeps scan reports across deploys/restarts (requires Starter plan)
    # disk:
    #   name: scan-data
    #   mountPath: /opt/render/project/src/spotify_audit/data
    #   sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GENIUS_TOKEN
        sync: false
      - key: DISCOGS_TOKEN
        sync: false
      - key: SETLISTFM_API_KEY
        sync: false
      - key: LASTFM_API_KEY
        sync: false
